<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste com imagens</title>
</head>

<body>
    <h1>Testando carga de imagens</h1>
    <p>Logo abaixo você verá uma imagem (Redimensionada) que está na mesma pasta:</p>
    <img src="logo-css.png" alt="Logo CSS3">
    <p>Outro exemplo de imagem redimensionada, porém carregada de uma sub-pasta:</p>
    <img src="imagens/logo-html.png" alt="Logo HTML5">
    <p>Também podemos carregar imagens externas (Que não estão salvas em pastas):</p>
    <img src="https://cdn.iconscout.com/icon/free/png-512/free-javascript-logo-icon-svg-download-png-1720087.png?f=webp&w=256"
        alt="Logo JavaScript"> <!-- URL -->
</body>

</html>
