<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/favicons/favicon-dedo.ico" type="image/x-icon">
    <title>Imagem Flexível</title>
</head>

<body>
    <h1>Imagem Adaptativa</h1>
    <p>
        Você está vendo a imagem completa ? <br>
        Experimente ampliar o tamanho da sua janela
        para aproveitar a melhor experiência 🤯
    </p>

    <p>
        <picture>
            <source media="(max-width: 549px)" srcset="imagens/paisagem-p.jpeg" type="image/jpeg">
            <source media="(max-width: 1050px)" srcset="imagens/paisagem-m.jpeg" type="image/jpeg">
            <img src="imagens/paisagem-g.jpeg" alt="Mulher no topo da montanha.">
        </picture>
    </p>

    <p>
        <picture>
            <source media="(max-width: 790px)" srcset="imagens/paisagem-p-guanabara.png" type="image/png    ">
            <source media="(max-width: 1250px)" srcset="imagens/paisagem-m-guanabara.png" type="image/png">
            <img src="imagens/paisagem-g-guanabara.png" alt="">
        </picture>
    </p>
</body>

</html>
